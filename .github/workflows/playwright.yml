name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start the app stack
        run: docker compose up -d --wait

      - name: Wait for the app to be reachable
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:5173 > /dev/null; do sleep 2; done'
          timeout 90 bash -c 'until curl -sf http://localhost:8080 > /dev/null; do sleep 2; done'

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install E2E dependencies
        working-directory: client/E2E
        run: npm ci

      - name: Install Playwright browsers
        working-directory: client/E2E
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: client/E2E
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: client/E2E/playwright-report/
          retention-days: 30

      - name: Tear down the app stack
        if: always()
        run: docker compose down -v
